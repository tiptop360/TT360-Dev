name: Theme asset audit

# Guardrail against the dead/backup-asset rot this repo accumulated.
# Hard-fails if any backup/duplicate-pattern asset filename reappears; reports
# unreferenced css/js assets for review.

on:
  push:
    paths:
      - 'theme-files/**'
      - 'validators/theme-asset-audit.mjs'
  pull_request:
    paths:
      - 'theme-files/**'
      - 'validators/theme-asset-audit.mjs'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Strict: fails on backup-pattern files AND any unreferenced asset.
      # (Enabled after the Phase 1 cleanup removed the 41 dead assets.)
      - run: node validators/theme-asset-audit.mjs --strict
